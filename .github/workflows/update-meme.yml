name: Update Meme

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch meme
        id: meme
        run: |
          MEME_URL=$(curl -s https://git-meme.vercel.app/api/memes/random | jq -r '.imageUrl')
          echo "url=$MEME_URL" >> $GITHUB_OUTPUT

      - name: Update README
        run: |
          awk -v meme="${{ steps.meme.outputs.url }}" '
          /<!-- MEME -->/ {
            print "<!-- MEME -->"
            print "<img src=\"" meme "\" alt=\"Programming Meme\" width=\"500\" />"
            print "<!-- /MEME -->"
            skip=1
            next
          }
          /<!-- \/MEME -->/ { skip=0; next }
          !skip { print }
          ' README.md > temp.md

          mv temp.md README.md

      - name: Commit changes
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add README.md
          git diff --cached --quiet || git commit -m "😂 Updated daily meme"
          git push
